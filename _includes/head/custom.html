<style>
	/* Loader top bar */
	body > .loader-bar {
		display: none;
		top: 0;
		left: 0;
		width: 100%;
		height: 0.5em;
		background: linear-gradient(
			90deg,
			transparent 0%,
			orange 30%,
			orange 70%,
			transparent 100%
		);
		background-size: 200% 100%;
		animation: loading 1.5s linear infinite;
		z-index: 9998;
		box-shadow: 0 0 1em rgba(0, 0, 0, 0.7);
	}

	@keyframes loading {
		0% {
			background-position: 200% 0;
		}
		100% {
			background-position: -200% 0;
		}
	}
</style>
