name: social-facebook

on:
  repository_dispatch:
    types:
      - post_published
  workflow_dispatch:
    inputs:
      posts_json:
        description: 'Payload JSON de posts publicados'
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      POSTS_JSON: ${{ github.event_name == 'workflow_dispatch' && inputs.posts_json || toJson(github.event.client_payload.posts) }}
      FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
      FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
      META_GRAPH_VERSION: ${{ vars.META_GRAPH_VERSION || 'v20.0' }}

    steps:
      - name: Prepare payload
        run: |
          mkdir -p social-state
          if [ -z "$POSTS_JSON" ] || [ "$POSTS_JSON" = "null" ]; then
            printf '[]' > posts.json
          else
            printf '%s' "$POSTS_JSON" > posts.json
          fi
          jq type posts.json > /dev/null

      - name: Publish to Facebook
        run: |
          set -euo pipefail
          if [ -z "$FACEBOOK_PAGE_ID" ] || [ -z "$FACEBOOK_PAGE_ACCESS_TOKEN" ]; then
            echo '{"platform":"facebook","status":"failed","reason":"missing_config"}' >> social-state/facebook.jsonl
            echo "::error::Segredos FACEBOOK_PAGE_ID e FACEBOOK_PAGE_ACCESS_TOKEN obrigatorios."
            exit 1
          fi

          graph="https://graph.facebook.com/${META_GRAPH_VERSION}"
          jq -c '.[]' posts.json | while IFS= read -r post; do
            title="$(jq -r '.title // ""' <<< "$post")"
            summary="$(jq -r '.summary // ""' <<< "$post")"
            url="$(jq -r '.url // ""' <<< "$post")"
            image="$(jq -r '.image // ""' <<< "$post")"
            hashtags="$(jq -r '(.hashtags // []) | map("#" + .) | join(" ")' <<< "$post")"
            message="$(printf '%s\n\n%s\n\n%s' "$title" "$summary" "$hashtags")"

            if [ -n "$image" ]; then
              curl --fail-with-body --silent --show-error --location --retry 3 --retry-delay 15 --retry-all-errors \
                -X POST "${graph}/${FACEBOOK_PAGE_ID}/photos" \
                --data-urlencode "url=${image}" \
                --data-urlencode "caption=${message}" \
                --data-urlencode "access_token=${FACEBOOK_PAGE_ACCESS_TOKEN}" > /dev/null
            else
              curl --fail-with-body --silent --show-error --location --retry 3 --retry-delay 15 --retry-all-errors \
                -X POST "${graph}/${FACEBOOK_PAGE_ID}/feed" \
                --data-urlencode "message=${message}" \
                --data-urlencode "link=${url}" \
                --data-urlencode "access_token=${FACEBOOK_PAGE_ACCESS_TOKEN}" > /dev/null
            fi

            jq -cn --arg platform facebook --arg status published --arg url "$url" \
              '{platform:$platform,status:$status,url:$url,finished_at:now|todateiso8601}' >> social-state/facebook.jsonl
          done

      - name: Upload Facebook state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: social-facebook-state
          path: social-state/facebook.jsonl
          if-no-files-found: warn

      - name: Dispatch Instagram workflow
        uses: actions/github-script@v8
        with:
          script: |
            const posts = JSON.parse(process.env.POSTS_JSON || '[]');
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: 'post_social_facebook_done',
              client_payload: {
                source_workflow: context.workflow,
                source_run_id: String(context.runId),
                posts
              }
            });
