name: Customizado Jekyll

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main # O branch main contem o codigo-fonte do site.

  workflow_dispatch: # Permite execução manual (Actions > Run workflow)

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  jekyll:
    if: github.ref == 'refs/heads/main' # Segurança extra
    runs-on: ubuntu-latest
    outputs:
      has_posts: ${{ steps.posts.outputs.has_posts }}
      post_count: ${{ steps.posts.outputs.post_count }}
      posts_json: ${{ steps.posts.outputs.posts_json }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4.7'

      - name: Install Ruby dependencies
        run: |
          gem install bundler -v 4.0.10
          bundle config set path vendor/bundle
          bundle install --jobs 4 --retry 3

      - name: Install Node dependencies
        run: npm ci

      - name: Detect published posts
        id: posts
        run: |
          ruby scripts/collect_published_posts.rb \
            --diff-base "${{ github.event.before }}" \
            --diff-head "${{ github.sha }}" \
            --site-url "${{ steps.pages.outputs.base_url }}" \
            --out published-posts.json

      - name: Build Jekyll site
        run: |
          npm run build:ts
          bundle exec jekyll build --trace --baseurl=
        env:
          JEKYLL_ENV: production

      - name: Verify root deployment paths
        run: |
          test -f _site/CNAME
          test "$(cat _site/CNAME)" = "www.jeancarloem.com"
          if grep -RInE '((href|src)=["'\'']\/blog\/|url\(["'\'']?\/blog\/)' _site; then
            echo "::error::O site foi gerado com caminhos sob /blog. O deploy deve ficar na raiz do dominio."
            exit 1
          fi

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: jekyll
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Validate published posts
        if: needs.jekyll.outputs.has_posts == 'true'
        env:
          POSTS_JSON: ${{ needs.jekyll.outputs.posts_json }}
        run: |
          printf '%s' "$POSTS_JSON" > published-posts.json
          jq -r '.[].url' published-posts.json | while IFS= read -r url; do
            curl --fail --silent --show-error --location --retry 6 --retry-delay 10 "$url" > /dev/null
          done

      - name: Start external distribution
        if: needs.jekyll.outputs.has_posts == 'true'
        uses: actions/github-script@v8
        env:
          POSTS_JSON: ${{ needs.jekyll.outputs.posts_json }}
        with:
          script: |
            const posts = JSON.parse(process.env.POSTS_JSON || '[]');
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: 'post_published',
              client_payload: {
                source_workflow: context.workflow,
                source_run_id: String(context.runId),
                posts
              }
            });
